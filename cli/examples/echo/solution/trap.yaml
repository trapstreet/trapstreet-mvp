cmd: uv run python echo.py
stdin: input.json
# Self-reported "Solution metadata" — never validated by trapstreet,
# shown on the run detail page so the leaderboard isn't a black box.
metadata:
  framework: stdlib-python
  notes: reference solution

tasks:
  # Local task name = trapstreet task_id so `tp submit` Just Works
  # without --as flag.
  echo:
    description: Echo solution — reads stdin JSON and writes it back to stdout
    traptask:
      source: ../task

  run:
    traptask:
      source: ../task
