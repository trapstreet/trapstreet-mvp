cmd: uv run python echo.py
stdin: input.json
# Self-reported engine identity — strict (model/framework only), surfaced on the
# run detail page so the leaderboard isn't a black box. Each field takes a scalar
# or a list.
profile:
  framework: stdlib-python
# Free-form author notes: tolerated but never written to the report.
extra:
  notes: reference solution

tasks:
  # Local task name = trapstreet task_id so `tp submit` Just Works
  # without --as flag.
  echo:
    description: Echo solution — reads stdin JSON and writes it back to stdout
    traptask:
      source: ../task

  run:
    traptask:
      source: ../task
