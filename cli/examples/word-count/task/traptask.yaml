dirs:
  inputs: inputs/
  expected: expected/

cases:
  - id: basic
    description: word frequencies and summary across three words
    tags: [smoke]

  - id: case_insensitive
    description: words normalised to lowercase when case_sensitive is false
    tags: [smoke]

  - id: case_sensitive
    description: words kept as-is when case_sensitive is true

  - id: empty
    description: empty text produces zero counts and empty top_words

judge:
  cmd: uv run python judge.py

grader:
  cmd: uv run python grader.py
