dirs:
  inputs: inputs/
  expected: expected/

cases:
  - id: basic
    description: word frequencies and summary across three words
    tags: [smoke]

  - id: case_insensitive
    description: words normalised to lowercase when case_sensitive is false
    tags: [smoke]

  - id: case_sensitive
    description: words kept as-is when case_sensitive is true

  - id: empty
    description: empty text produces zero counts and empty top_words

# Advisory contract for solution authors — the files a solution should write
# into the manifest's outputs directory. Not enforced by trap; the judge scans
# outputs and decides. Omit for tasks with dynamically-named outputs.
file_outputs:
  - frequencies.json
  - summary.json

judge:
  cmd: uv run python judge.py

grader:
  cmd: uv run python grader.py
