dirs:
  inputs: inputs/
  expected: expected/

# Advisory contract for solution authors — what a solution produces (output
# filenames, and/or stdout/stderr for the standard streams). Not enforced by
# trap; the judge scans outputs and decides. Omit for dynamically-named outputs.
declared_outputs:
  - frequencies.json
  - summary.json

cases:
  - id: basic
    description: word frequencies and summary across three words
    tags: [smoke]

  - id: case_insensitive
    description: words normalised to lowercase when case_sensitive is false
    tags: [smoke]

  - id: case_sensitive
    description: words kept as-is when case_sensitive is true

  - id: empty
    description: empty text produces zero counts and empty top_words

judge:
  cmd: uv run python judge.py

grader:
  cmd: uv run python grader.py
